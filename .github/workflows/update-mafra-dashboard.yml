name: 🟢 Update Mafra WEBNAR Dashboard

on:
  schedule:
    - cron: '30 */10 * * *'   # a cada 10h, offset 30min do NBP
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (scripts + template)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Fetch Meta API data & build dashboard
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/update_mafra_dashboard.py

      - name: Deploy mafra.html → gh-pages
        run: |
          cp mafra.html /tmp/mafra.html

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -f mafra.html

          git fetch origin gh-pages
          git checkout gh-pages

          cp /tmp/mafra.html mafra.html

          git add mafra.html
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "Mafra auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin gh-pages
            echo "✅ mafra.html publicado!"
          fi
